name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to create/update GitHub Pages deployments
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Build the React frontend ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Point the frontend at the live Render backend.
          # Set this secret in: Settings → Secrets → Actions → VITE_API_URL
          # Example value: https://football-predictor-api.onrender.com
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Sub-path used when the site lives at nickesmi.github.io/football_predictor_ai/
          # Override this secret with '/' if you configure a custom domain.
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH || '/football_predictor_ai/' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # ── 2. Deploy to GitHub Pages ─────────────────────────────────────────────
  deploy-pages:
    needs: build-frontend
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── 3. Trigger Render backend re-deploy ───────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_URL in: Settings → Secrets → Actions
        # Get the URL from your Render service → Settings → Deploy Hooks
        if: secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --silent --show-error
